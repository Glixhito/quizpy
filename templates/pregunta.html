{% extends "base.html" %}
{% block title %}Pregunta {{ numero }}{% endblock %}
{% block content %}
<style>
  .progress-bar-wrap {
    background: #e0dbd0;
    border: 2px solid var(--border);
    border-radius: 999px;
    height: 10px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 999px;
    transition: width .4s ease;
  }
  .counter {
    font-size: .72rem;
    color: var(--muted);
    margin-bottom: .75rem;
  }
  .question-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .options { display: flex; flex-direction: column; gap: .6rem; }
  .option-label {
    display: flex;
    align-items: center;
    gap: .75rem;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: .7rem 1rem;
    cursor: pointer;
    transition: background .1s, box-shadow .1s;
    background: var(--bg);
    font-size: .85rem;
  }
  .option-label:hover {
    background: #ffe8e0;
    box-shadow: 3px 3px 0 var(--border);
  }
  input[type="radio"] { accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; }
  .submit-wrap { margin-top: 1.5rem; }
</style>

<div class="card">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" style="width: {{ progreso }}%"></div>
  </div>
  <div class="counter">Pregunta {{ numero }} de {{ total }}</div>
  <div class="question-text">{{ pregunta }}</div>

  <form method="POST" action="/pregunta">
    <div class="options">
      {% for opcion in opciones %}
      <label class="option-label">
        <input type="radio" name="opcion" value="{{ opcion }}" required>
        {{ opcion }}
      </label>
      {% endfor %}
    </div>
    <div class="submit-wrap">
      <button type="submit" class="btn btn-primary btn-full">Responder →</button>
    </div>
  </form>
</div>
{% endblock %}
